    <style>
      :root {
        scroll-padding-top: 100px;
      }
      body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
        background-color: #ffffff;
        color: #0f172a;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .mesh-gradient {
        background-color: #ffffff;
        background-image: 
          radial-gradient(at 0% 0%, hsla(217,100%,95%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(199,100%,95%,1) 0, transparent 50%);
      }

      /* Reveal Animation Classes */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* Hover Glow Effects */
      .hover-glow {
        position: relative;
        transition: all 0.5s ease;
      }
      .hover-glow:hover::after {
        content: '';
        position: absolute;
        inset: -2px;
        background: linear-gradient(45deg, #2563eb, #7dd3fc, #2563eb);
        filter: blur(15px);
        z-index: -1;
        opacity: 0.3;
        border-radius: inherit;
        animation: rotate-glow 3s linear infinite;
      }

      @keyframes rotate-glow {
        from { filter: blur(15px) hue-rotate(0deg); }
        to { filter: blur(15px) hue-rotate(360deg); }
      }

      /* Float Animation */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      /* Custom WhatsApp Pulse */
      @keyframes pulse-green {
        0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
        70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
        100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
      }
      .whatsapp-pulse {
        animation: pulse-green 2s infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>
</head>
  <body class="overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Scroll Reveal Logic
      window.addEventListener('scroll', () => {
        const reveals = document.querySelectorAll('.reveal');
        reveals.forEach(reveal => {
          const windowHeight = window.innerHeight;
          const elementTop = reveal.getBoundingClientRect().top;
          const elementVisible = 150;
          if (elementTop < windowHeight - elementVisible) {
            reveal.classList.add('active');
          }
        });
      });
    </script>
  </body>
